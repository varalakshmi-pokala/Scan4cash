<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background: #28a745;
            color: white;
        }

        img {
            width: 80px;
        }

        button {
            padding: 5px 10px;
            margin: 2px;
        }
    </style>
</head>

<body>

    <h2>📋 Scan4Cash Admin Dashboard</h2>

    <table id="dataTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Waste Type</th>
                <th>Date</th>
                <th>Time</th>
                <th>Description</th>

                <th>Location</th>

                <th>Image</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <h2>📩 Contact Messages</h2>

    <table id="contactTable">
        <thead>
            <tr>
                <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>   <!-- ADD -->
    <th>Message</th>
</tr>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        async function loadData() {
            const res = await fetch("/requests");
            const data = await res.json();

            const table = document.querySelector("#dataTable tbody");
            table.innerHTML = "";

            data.forEach(item => {
                const row = `
        <tr>
            <td>${item.name}</td>
            <td>${item.phone}</td>
            <td>${item.email}</td>
            <td>${item.wasteType || "-"}</td>
<td>${item.date || "-"}</td>
<td>${item.time || "-"}</td>
            <td>${item.description}</td>
            
            <td>${item.location}</td>
            
            <td>
                <img src="/uploads/${item.image}" />
            </td>
            <td>${item.status}</td>
            <td>
                <button onclick="updateStatus('${item._id}','Approved')">Approve</button>
                <button onclick="updateStatus('${item._id}','Completed')">Done</button>
                <button onclick="deleteReq('${item._id}')">Delete</button>
            </td>
        </tr>
        `;
                table.innerHTML += row;
            });
        }

        async function updateStatus(id, status) {
            await fetch("/update/" + id, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status })
            });

            loadData(); // refresh
        }

        loadData();
        async function deleteReq(id) {
            await fetch("/delete/" + id, { method: "DELETE" });
            loadData();
        }
        async function loadContacts() {
    const res = await fetch("/contacts");
    const data = await res.json();

    const table = document.querySelector("#contactTable tbody");
    table.innerHTML = "";

    data.forEach(item => {
        table.innerHTML += `
        <tr>
            <td>${item.name}</td>
            <td>${item.email}</td>
            <td>${item.message}</td>
        </tr>
        `;
    });
}
        loadData();
        loadContacts();

    </script>

</body>

</html>
